services:
  misterytrips:
    build:
      context: .
      dockerfile_inline: |
        FROM node:20-alpine
        RUN apk add --no-cache git wget
        WORKDIR /app
        RUN git clone --depth 1 https://github.com/DraconxAdmin/misterytrips.git .
        RUN npm ci --omit=dev
        ENV NODE_ENV=production
        ENV PORT=3000
        EXPOSE 3000
        HEALTHCHECK --interval=30s --timeout=5s --start-period=15s --retries=3 \
          CMD wget -qO- http://127.0.0.1:3000/health || exit 1
        CMD ["node", "server.js"]
    image: misterytrips:latest
    container_name: misterytrips
    restart: unless-stopped
    environment:
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      FROM_EMAIL: ${FROM_EMAIL}
      FROM_NAME: ${FROM_NAME}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      SITE_URL: ${SITE_URL}
      PORT: 3000
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik
      - traefik.http.routers.misterytrips.rule=Host(`misterytrips.com`) || Host(`www.misterytrips.com`)
      - traefik.http.routers.misterytrips.entrypoints=websecure
      - traefik.http.routers.misterytrips.tls.certresolver=letsencrypt
      - traefik.http.services.misterytrips.loadbalancer.server.port=3000
      - traefik.http.routers.misterytrips-web.rule=Host(`misterytrips.com`) || Host(`www.misterytrips.com`)
      - traefik.http.routers.misterytrips-web.entrypoints=web
      - traefik.http.routers.misterytrips-web.middlewares=misterytrips-redirect
      - traefik.http.middlewares.misterytrips-redirect.redirectscheme.scheme=https
    networks:
      - traefik

networks:
  traefik:
    external: true
